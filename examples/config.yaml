# Example config: all transports, Let's Encrypt TLS, ALG13 DNSSEC zone.
#
# Prerequisites:
#    mkdir -p certs keys
# 1. Generate ALG13 (ECDSAP256SHA256) zone keys:
#    ./gadget-dns-server --generate-zone-keys --domain dnssrc.example.com \
#      --dnssec-ksk ./keys/ksk --dnssec-zsk ./keys/zsk
# 2. Obtain TLS cert (run once; ensure port 80 is reachable and domain points here):
#    ./gadget-dns-server --obtain-cert --config examples/config.yaml
# 3. Run the server:
#    ./gadget-dns-server --config examples/config.yaml
#
# Replace dnssrc.example.com with your delegated zone and DoH/DoT hostname.

domain: dnssrc.example.com

# All transports
udp_addrs:
  - ":53"
tcp_addrs:
  - ":53"
dot_port: 853
doh_port: 443
doq_port: 8853

# TLS cert and key (obtained via ACME; stored here)
tls_cert: ./certs/fullchain.pem
tls_key: ./certs/privkey.pem

# Zone apex: NS and A/AAAA (for delegation)
# Set server_ips via env if needed: GADGET_SERVER_IPS=192.0.2.1,2001:db8::1
ns_records:
  - ns1.dnssrc.example.com
  - ns2.dnssrc.example.com

# Let's Encrypt: domains for the certificate (DoH/DoT hostname)
acme_domains:
  - dnssrc.example.com
  - ns1.dnssrc.example.com
acme_account_key: ./certs/acme-account.key
acme_renew_days: 14
# Optional: use staging for testing
# acme_url: https://acme-staging-v02.api.letsencrypt.org/directory

# HTTP server: port 80 for ACME challenges; optional TLS on 443 for health/metrics/feed
http_port: 80
http_tls_port: 443

# ALG13 (ECDSAP256SHA256) DNSSEC zone
dnssec: true
dnssec_ksk_path: ./keys/ksk
dnssec_zsk_path: ./keys/zsk
dnssec_publish_cds: true
# RRSIG: inception = now - 1h, expiration = now + 24h (default)
dnssec_rrsig_inception: "1h"
dnssec_rrsig_validity: "24h"

log_level: info
