# Example config: canonical delegation — one zone, apex and www point to this server.
#
# --- Parent zone setup ---
# Delegate the zone to this server. In the parent zone (e.g. .com for example.com), add:
#
#   ; Delegate the zone to the server (in-bailiwick: NS at apex)
#   dnssrc.example.com.     NS      dnssrc.example.com.
#
#   ; Apex A/AAAA so the NS target resolves (replace with your server's IPs)
#   dnssrc.example.com.          A       192.0.2.1
#   dnssrc.example.com.          AAAA    2001:db8::1
#   ; Records for www and diag (replace with your server's IPs)
#   www.dnssrc.example.com.      CNAME   dnssrc.example.com.
#   diag.dnssrc.example.com.     CNAME   dnssrc.example.com.
#
#   ; Optionally, obtain the CDS record from the zone.
#   ; and put is as a DS record in the parent zone.
#   dnssrc.example.com.     DS      <DS record>
#
# This server then serves the zone: apex (SOA, NS, A, AAAA), www (A, AAAA), diag and
# <token>.diag (A, AAAA, TXT), plus gadget endpoints. Webserver is at https://www.example.com
# and diag dashboard at https://diag.example.com/<token>.
#
# --- Prerequisites (on this server) ---
#   mkdir -p certs keys
# 1. Generate zone keys:
#    ./gadget-dns-server --generate-zone-keys --domain example.com \
#      --dnssec-ksk ./keys/ksk --dnssec-zsk ./keys/zsk
# 2. Obtain TLS cert (run once; port 80 must be reachable, www and diag must resolve here):
#    ./gadget-dns-server --obtain-cert --config examples/config.yaml
# 3. Run the server:
#    ./gadget-dns-server --config examples/config.yaml

domain: dnssrc.example.com

# Ports and bind addresses (same bindings for all services).
# Omit binds to listen on all interfaces.
ports:
  udp: 53
  tcp: 53
  dot: 853
  doh: 443
  doq: 8853
binds:
  - 0.0.0.0
  - "::"

# TLS cert and key (obtained via ACME; stored here)
tls_cert: ./certs/fullchain.pem
tls_key: ./certs/privkey.pem

# Zone apex: NS name(s) and A/AAAA for apex, www, and diag.
# server_ips is optional: if unset, IPs are derived from binds (when specific IPs like 192.0.2.1)
# or from interface addresses (when binds are 0.0.0.0/::). Set explicitly or via GADGET_SERVER_IPS to override.
server_ips:
  - 192.0.2.1
  - 2001:db8::1
ns_records:
  - dnssrc.example.com

# Diag: how long to keep diagnostic data (token.diag query events). Data older than this is pruned. Default 15m.
diag_retention: 15m

# Let's Encrypt: www (webserver) and diag (dashboard at https://diag.<zone>/<token>)
acme_domains:
  - ns0.dnssrc.example.com
  - dnssrc.example.com
  - diag.dnssrc.example.com
acme_account_key: ./certs/acme-account.key
acme_renew_days: 14
# Optional: use staging for testing
# acme_url: https://acme-staging-v02.api.letsencrypt.org/directory

# HTTP server: port 80 for ACME challenges; TLS on 443 for health/metrics/feed and DoH (/dns-query)
# When doh (below) equals http_tls_port, DoH is served on this same TLS listener (no separate bind).
http_port: 80
http_tls_port: 443

# ALG13 (ECDSAP256SHA256) DNSSEC zone
dnssec: true
dnssec_ksk_path: ./keys/ksk
dnssec_zsk_path: ./keys/zsk
dnssec_publish_cds: true
# RRSIG: inception = now - 1h, expiration = now + 24h (default)
dnssec_rrsig_inception: "1h"
dnssec_rrsig_validity: "24h"

log_level: info
