# Prek / pre-commit config: go fmt, go vet, staticcheck
# Install hooks: prek install
# Run manually: prek run

repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: go fmt ./...
        files: '\.go$'
        pass_filenames: false

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        pass_filenames: false
        always_run: true

      - id: staticcheck
        name: staticcheck
        language: system
        # Use go run so staticcheck is built with the same toolchain as this module (go.mod
        # toolchain). A standalone staticcheck binary built with an older Go can fail against
        # a newer GOROOT (e.g. "file requires newer Go version go1.26 (application built with go1.24)").
        entry: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
        pass_filenames: false
        always_run: true
