# Prek / pre-commit config: go fmt, go vet, staticcheck
# Install hooks: prek install
# Run manually: prek run

repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: go fmt ./...
        files: '\.go$'
        pass_filenames: false

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        pass_filenames: false
        always_run: true

      - id: staticcheck
        name: staticcheck
        language: system
        entry: staticcheck ./...
        pass_filenames: false
        always_run: true
